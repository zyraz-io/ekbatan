# Build-time gate for the in-process EventHandlingJob — Quarkus's @IfBuildProperty evaluates
# this at jar/test bootstrap time. The Spring Boot starter test sets the same flag at runtime via
# @DynamicPropertySource; in Quarkus, runtime overrides can't toggle build-time conditionals, so
# the integration test ships the value here.
ekbatan.local-event-handler.handling.enabled=true

# Tell Quarkus's deployment-time scanner to also walk the di:shared jar's Jandex index. Without
# this, only the test app's own classes are indexed — and @EkbatanAction WidgetCreateAction,
# @EkbatanRepository WidgetRepository, @EkbatanEventHandler WidgetCreatedCounterHandler all
# live in the shared jar, so the Ekbatan extension's discoverEkbatanBeans build step finds
# nothing and CDI fails with UnsatisfiedResolutionException for WidgetRepository at boot.
quarkus.index-dependency.di-shared.group-id=io.github.zyraz-io
quarkus.index-dependency.di-shared.artifact-id=ekbatan-integration-tests-di-shared


# Quiet down jboss-logmanager during tests; the log-line floor is INFO so important info still
# surfaces.
quarkus.log.level=INFO
quarkus.log.category."io.ekbatan".level=DEBUG

# Reachability metadata for HikariCP is vendored into
# src/main/resources/META-INF/native-image/com.zaxxer/HikariCP/reachability-metadata.json
# (copied from GraalVM Reachability Metadata Repository's HikariCP/6.0.0 entry — explicitly
# tested against HikariCP 7.0.2). Quarkus's native build does NOT auto-consume the GraalVM
# RMR (cf. quarkusio/quarkus#28994), so the metadata has to be vendored.
#
# Earlier we tried `--initialize-at-build-time=com.zaxxer.hikari` here as a fix; that's
# actually what broke things. HikariCP 7.x's HikariConfig uses an `AtomicReference<Credentials>`
# field for username/password; snapshotting that AtomicReference at build time leaves
# `credentials.get()` returning null at runtime, which surfaces as the NPE at PoolBase.java:373.
