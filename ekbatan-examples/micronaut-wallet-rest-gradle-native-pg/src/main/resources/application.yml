micronaut:
  application:
    name: micronaut-wallet-rest-gradle-pg

# Single source of truth for DB connection details — both Flyway (run on startup via
# FlywayConfiguration) and Ekbatan's runtime pools read from this same block. Micronaut's
# own datasource auto-config (micronaut-data, jdbc) is intentionally NOT used — we don't
# declare a `datasources.default` here.
ekbatan:
  namespace: example.wallet
  sharding:
    defaultShard:
      group: 0
      member: 0
    groups:
      - group: 0
        name: default
        members:
          - member: 0
            name: default
            configs:
              primaryConfig:
                jdbcUrl: jdbc:postgresql://localhost:5432/wallet
                username: wallet
                password: wallet
                # Micronaut's Hikari init in this combo doesn't always pick the PG driver via the
                # SPI when the JVM is started by Gradle's worker — declare it explicitly. Same
                # caution applies to the jobsConfig block below.
                driverClassName: org.postgresql.Driver
                maximumPoolSize: 20
              jobsConfig:
                jdbcUrl: jdbc:postgresql://localhost:5432/wallet
                username: wallet
                password: wallet
                driverClassName: org.postgresql.Driver
                maximumPoolSize: 5
  local-event-handler:
    handling:
      enabled: true

# micronaut-flyway: runs migrations on application startup. The datasource it binds to is
# `flyway.datasources.default` — coords here are pulled from `ekbatan.sharding.*` via
# property expressions (single source of truth). `EkbatanShardFlywayCustomizer` additionally
# overrides the dataSource programmatically inside `FluentConfiguration.customize(...)` —
# symmetric with the Quarkus wallet's customizer, and a single place to extend Flyway
# behaviour later (locations, callbacks, etc.) without touching YAML.
flyway:
  datasources:
    default:
      enabled: true
      url: ${ekbatan.sharding.groups[0].members[0].configs.primaryConfig.jdbcUrl}
      user: ${ekbatan.sharding.groups[0].members[0].configs.primaryConfig.username}
      password: ${ekbatan.sharding.groups[0].members[0].configs.primaryConfig.password}
