# Quarkus app metadata
quarkus.application.name=quarkus-wallet-rest-maven-native-mariadb

# Build-time gate for the in-process EventHandlingJob. Quarkus's @IfBuildProperty evaluates
# this at jar/test bootstrap time — runtime overrides can't toggle a build-time conditional,
# so the value lives here.
ekbatan.local-event-handler.handling.enabled=true

# Connection details for the local MariaDB (started by compose.yaml during ./mvnw quarkus:dev
# and the packaged binary). Quarkus binds these into ShardingConfig via the Ekbatan extension's
# Jackson hybrid path. driverClassName is supplied explicitly because Quarkus's runtime
# classloader doesn't auto-discover JDBC Driver SPIs during Arc producer evaluation.
#
# Note: eventlog is a separate database `eventlog`, created by the V0000 Flyway migration.
# The connecting user needs cross-database privileges — set up by `mariadb_init.sql` mounted
# into /docker-entrypoint-initdb.d/. See docs/database/mariadb.md.
ekbatan.namespace=example.wallet.maven-native-mariadb-quarkus
ekbatan.sharding.defaultShard.group=0
ekbatan.sharding.defaultShard.member=0
ekbatan.sharding.groups[0].group=0
ekbatan.sharding.groups[0].name=default
ekbatan.sharding.groups[0].members[0].member=0
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.jdbcUrl=jdbc:mariadb://localhost:3306/wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.username=wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.password=wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.driverClassName=org.mariadb.jdbc.Driver
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.maximumPoolSize=20
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.jdbcUrl=jdbc:mariadb://localhost:3306/wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.username=wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.password=wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.driverClassName=org.mariadb.jdbc.Driver
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.maximumPoolSize=5

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.ekbatan".level=INFO
quarkus.log.category."io.example.wallet".level=DEBUG

# Embed SQL migration files into the native binary so NativeImageFlywayResourceProvider
# can find them at runtime. Quarkus only includes resources matching this pattern when
# building native — without quarkus-flyway extension (which auto-registers them), the
# migrations aren't in the binary and Flyway reports "0 migrations found, are your
# locations set up correctly?". Pattern matches V*.sql, R*.sql, U*.sql under db/migration.
quarkus.native.resources.includes=db/migration/*.sql,mariadb_init.sql,mysql_init.sql,postgres_init.sql

# Tell ekbatan-native's Jackson3RecordsFeature to scan io.example.* as well as
# io.ekbatan when registering record components for reflection. Without this the
# wallet app's records (WalletCreateAction$Params etc.) aren't registered, and at
# runtime any Jackson 3 deserialisation calling Class.getRecordComponents()
# throws UnsupportedFeatureError. The escaped comma is because
# quarkus.native.additional-build-args uses comma as its inter-arg separator.
quarkus.native.additional-build-args=-Dio.ekbatan.graalvm.scan.packages=io.ekbatan\\,io.example

# Quarkus's Arc processor crashes during bean discovery with
# `IndexOutOfBoundsException` in Types.getProducerMethodTypeClosure — see Quarkus
# issue #11863 ("Generic type arguments of producer method need to be in a bean
# archive"). The @Produces methods that ship with ekbatan-quarkus return types
# parameterized over types defined in ekbatan-native (e.g. resource providers,
# helpers); when those types aren't indexed, the Arc type-closure walker hits an
# empty parameter list and IOOBEs at index 0.
#
# Only required for Maven native projects — the Gradle native sibling uses a
# separate integrationTest source set whose classpath doesn't include ekbatan-native
# at deployment time, so the Arc walker never encounters the unindexed type closure
# in the first place.

# every class it might encounter via a producer method's type closure to be in the
# Jandex index — and Quarkus only auto-indexes runtime artifacts declared in the
# extension's META-INF/quarkus-extension.yaml. Transitives like ekbatan-handlers,
# ekbatan-local-event-handler, etc. aren't auto-indexed; if one of them contains
# the type referenced by an @Produces method's generic signature, Arc crashes with
# `IndexOutOfBoundsException` in Types.buildResolvedMap (the parameter list comes
# back empty because the class isn't in the index, while the argument list isn't).

# Tell Quarkus the datasource exists + its kind. URL/username/password are NOT set here —
# the EkbatanShardFlywayCustomizer (CDI bean, see io.example.wallet.startup) overrides the
# Flyway datasource with the default shard's primaryConfig at startup, so connection
# coordinates have a single source of truth: ekbatan.sharding.*. Quarkus still requires
# `db-kind` to know there's a datasource it should bind a Flyway bean to.
quarkus.datasource.db-kind=mariadb

# Run Flyway migrations as part of Quarkus's startup phase, before the StartupEvent fires
# (so ekbatan-jobs's scheduled_tasks-table polling sees the schema already in place).
quarkus.flyway.migrate-at-start=true
