# Quarkus app metadata
quarkus.application.name=quarkus-wallet-rest-maven-native-mariadb

# Build-time gate for the in-process EventHandlingJob.
ekbatan.local-event-handler.handling.enabled=true

ekbatan.namespace=example.wallet.quarkus-wallet-rest-maven-native-mariadb
ekbatan.sharding.defaultShard.group=0
ekbatan.sharding.defaultShard.member=0
ekbatan.sharding.groups[0].group=0
ekbatan.sharding.groups[0].name=global
ekbatan.sharding.groups[0].members[0].member=0
ekbatan.sharding.groups[0].members[0].name=global
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.jdbcUrl=jdbc:mariadb://localhost:3306/wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.username=wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.password=wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.driverClassName=org.mariadb.jdbc.Driver
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.maximumPoolSize=20
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.jdbcUrl=jdbc:mariadb://localhost:3306/wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.username=wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.password=wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.driverClassName=org.mariadb.jdbc.Driver
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.maximumPoolSize=5
ekbatan.sharding.groups[0].members[0].configs.lockConfig.jdbcUrl=jdbc:mariadb://localhost:3306/wallet
ekbatan.sharding.groups[0].members[0].configs.lockConfig.username=wallet
ekbatan.sharding.groups[0].members[0].configs.lockConfig.password=wallet
ekbatan.sharding.groups[0].members[0].configs.lockConfig.driverClassName=org.mariadb.jdbc.Driver
ekbatan.sharding.groups[0].members[0].configs.lockConfig.maximumPoolSize=30
ekbatan.sharding.groups[0].members[0].configs.lockConfig.leakDetectionThreshold=0
ekbatan.sharding.groups[1].group=1
ekbatan.sharding.groups[1].name=mexico
ekbatan.sharding.groups[1].members[0].member=0
ekbatan.sharding.groups[1].members[0].name=mexico
ekbatan.sharding.groups[1].members[0].configs.primaryConfig.jdbcUrl=jdbc:mariadb://localhost:3307/wallet
ekbatan.sharding.groups[1].members[0].configs.primaryConfig.username=wallet
ekbatan.sharding.groups[1].members[0].configs.primaryConfig.password=wallet
ekbatan.sharding.groups[1].members[0].configs.primaryConfig.driverClassName=org.mariadb.jdbc.Driver
ekbatan.sharding.groups[1].members[0].configs.primaryConfig.maximumPoolSize=20
ekbatan.sharding.groups[1].members[0].configs.jobsConfig.jdbcUrl=jdbc:mariadb://localhost:3307/wallet
ekbatan.sharding.groups[1].members[0].configs.jobsConfig.username=wallet
ekbatan.sharding.groups[1].members[0].configs.jobsConfig.password=wallet
ekbatan.sharding.groups[1].members[0].configs.jobsConfig.driverClassName=org.mariadb.jdbc.Driver
ekbatan.sharding.groups[1].members[0].configs.jobsConfig.maximumPoolSize=5
ekbatan.sharding.groups[1].members[0].configs.lockConfig.jdbcUrl=jdbc:mariadb://localhost:3307/wallet
ekbatan.sharding.groups[1].members[0].configs.lockConfig.username=wallet
ekbatan.sharding.groups[1].members[0].configs.lockConfig.password=wallet
ekbatan.sharding.groups[1].members[0].configs.lockConfig.driverClassName=org.mariadb.jdbc.Driver
ekbatan.sharding.groups[1].members[0].configs.lockConfig.maximumPoolSize=30
ekbatan.sharding.groups[1].members[0].configs.lockConfig.leakDetectionThreshold=0

quarkus.log.level=INFO
quarkus.log.category."io.ekbatan".level=INFO
quarkus.log.category."io.example.wallet".level=DEBUG


# Ekbatan's native-image feature must scan application records too, because Action.Params
# records live under io.example and Jackson needs their record components at runtime.
quarkus.native.additional-build-args[0]=-Dio.ekbatan.graalvm.scan.packages=io.ekbatan,io.example
