# Apache Maven Wrapper configuration.
# `distributionUrl` is the only required key; the wrapper script downloads this Maven
# distribution into ~/.m2/wrapper/dists on first run and caches it for subsequent invocations.
wrapperVersion=3.3.2
distributionType=only-script
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.11/apache-maven-3.9.11-bin.zip
