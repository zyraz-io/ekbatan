# Quarkus app metadata
quarkus.application.name=quarkus-wallet-rest-maven-pg

# Build-time gate for the in-process EventHandlingJob. Quarkus's @IfBuildProperty evaluates
# this at jar/test bootstrap time — runtime overrides can't toggle a build-time conditional,
# so the value lives here.
ekbatan.local-event-handler.handling.enabled=true

# Connection details for the local Postgres (started by compose.yaml during ./mvnw quarkus:dev
# and the packaged binary). Quarkus binds these into ShardingConfig via the Ekbatan extension's
# Jackson hybrid path. The driverClassName is supplied explicitly because Quarkus's runtime
# classloader doesn't auto-discover JDBC Driver SPIs during Arc producer evaluation — setting
# it makes Hikari Class.forName(...) the driver directly.
ekbatan.namespace=example.wallet.maven-pg-quarkus
ekbatan.sharding.defaultShard.group=0
ekbatan.sharding.defaultShard.member=0
ekbatan.sharding.groups[0].group=0
ekbatan.sharding.groups[0].name=default
ekbatan.sharding.groups[0].members[0].member=0
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.jdbcUrl=jdbc:postgresql://localhost:5432/wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.username=wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.password=wallet
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.driverClassName=org.postgresql.Driver
ekbatan.sharding.groups[0].members[0].configs.primaryConfig.maximumPoolSize=20
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.jdbcUrl=jdbc:postgresql://localhost:5432/wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.username=wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.password=wallet
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.driverClassName=org.postgresql.Driver
ekbatan.sharding.groups[0].members[0].configs.jobsConfig.maximumPoolSize=5

# Lock pool — backs the dialect-specific KeyedLockProvider.
ekbatan.sharding.groups[0].members[0].configs.lockConfig.jdbcUrl=jdbc:postgresql://localhost:5432/wallet
ekbatan.sharding.groups[0].members[0].configs.lockConfig.username=wallet
ekbatan.sharding.groups[0].members[0].configs.lockConfig.password=wallet
ekbatan.sharding.groups[0].members[0].configs.lockConfig.driverClassName=org.postgresql.Driver
ekbatan.sharding.groups[0].members[0].configs.lockConfig.maximumPoolSize=30
ekbatan.sharding.groups[0].members[0].configs.lockConfig.leakDetectionThreshold=0

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.ekbatan".level=INFO
quarkus.log.category."io.example.wallet".level=DEBUG

# Tell Quarkus the datasource exists + its kind. URL/username/password are NOT set here —
# the EkbatanShardFlywayCustomizer (CDI bean, see io.example.wallet.startup) overrides the
# Flyway datasource with the default shard's primaryConfig at startup, so connection
# coordinates have a single source of truth: ekbatan.sharding.*. Quarkus still requires
# `db-kind` to know there's a datasource it should bind a Flyway bean to.
quarkus.datasource.db-kind=postgresql

# Run Flyway migrations as part of Quarkus's startup phase, before the StartupEvent fires
# (so ekbatan-jobs's `scheduled_tasks` table polling sees the schema already in place).
quarkus.flyway.migrate-at-start=true
