spring:
  application:
    name: spring-boot-wallet-rest-gradle-sharded-pg
  # Disable Spring Boot's FlywayAutoConfiguration — it can only attach Flyway to a
  # single DataSource bean, but this wallet uses multiple shards. EkbatanShardFlywayMigrator
  # (a @Bean) runs Flyway once per shard's primaryConfig from the same
  # ekbatan.sharding.* tree the runtime pools read from.
  flyway:
    enabled: false

# Two shards along the *group* axis (policy / regional residency):
#   group=0, member=0 → global shard (the default; wallets with no country routing land here)
#   group=1, member=0 → mexico shard (wallets created with countryCode=MX)
#
# The "default" shard is also the fallback when a wallet's ShardedUUID encodes a shard that
# isn't currently registered (e.g. countryCode=AU encodes group=2, which has no DB here).
# See docs/database/sharding.md for the group-vs-member framing.
ekbatan:
  namespace: example.wallet.sharded
  sharding:
    defaultShard:
      group: 0
      member: 0
    groups:
      - group: 0
        name: global
        members:
          - member: 0
            name: global-eu-1
            configs:
              primaryConfig:
                jdbcUrl: jdbc:postgresql://localhost:5432/wallet_global
                username: wallet
                password: wallet
                maximumPoolSize: 20
      - group: 1
        name: mexico
        members:
          - member: 0
            name: mexico-cdmx-1
            configs:
              primaryConfig:
                jdbcUrl: jdbc:postgresql://localhost:5433/wallet_mexico
                username: wallet
                password: wallet
                maximumPoolSize: 20

logging:
  level:
    io.ekbatan: INFO
    io.example.wallet: DEBUG
