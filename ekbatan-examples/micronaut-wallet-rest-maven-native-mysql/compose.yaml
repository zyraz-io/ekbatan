services:
  mysql-global:
    image: mysql:9.4.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: wallet
      MYSQL_PASSWORD: wallet
      MYSQL_DATABASE: wallet
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - "./src/main/resources/mysql_init.sql:/docker-entrypoint-initdb.d/mysql_init.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 1s
      timeout: 5s
      retries: 30

  mysql-mexico:
    image: mysql:9.4.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: wallet
      MYSQL_PASSWORD: wallet
      MYSQL_DATABASE: wallet
      TZ: UTC
    ports:
      - "3307:3306"
    volumes:
      - "./src/main/resources/mysql_init.sql:/docker-entrypoint-initdb.d/mysql_init.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 1s
      timeout: 5s
      retries: 30
