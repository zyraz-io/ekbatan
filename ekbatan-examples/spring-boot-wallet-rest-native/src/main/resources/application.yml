spring:
  application:
    name: spring-boot-wallet-rest

# Single source of truth for DB connection details — both Flyway (run on startup via
# FlywayHelper) and Ekbatan's runtime pools read from this same block. Spring Boot's
# own DataSource/Flyway auto-config is intentionally NOT used.
ekbatan:
  namespace: example.wallet
  sharding:
    defaultShard:
      group: 0
      member: 0
    groups:
      - group: 0
        name: default
        members:
          - member: 0
            name: default
            configs:
              primaryConfig:
                jdbcUrl: jdbc:postgresql://localhost:5432/wallet
                username: wallet
                password: wallet
                maximumPoolSize: 20
              jobsConfig:
                jdbcUrl: jdbc:postgresql://localhost:5432/wallet
                username: wallet
                password: wallet
                maximumPoolSize: 5
  local-event-handler:
    handling:
      enabled: true

logging:
  level:
    io.ekbatan: INFO
    io.example.wallet: DEBUG
