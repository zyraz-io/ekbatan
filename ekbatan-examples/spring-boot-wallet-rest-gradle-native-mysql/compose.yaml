services:
  mysql:
    image: mysql:9.4.0
    environment:
      # MYSQL_USER / MYSQL_PASSWORD create the named user with rights ONLY on MYSQL_DATABASE.
      # Cross-database access (needed to CREATE DATABASE eventlog from a V0000 migration) comes
      # from `mysql_init.sql` below, which runs as root before the container becomes ready.
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: wallet
      MYSQL_PASSWORD: wallet
      MYSQL_DATABASE: wallet
      TZ: UTC
    ports:
      # Fixed mapping so the hard-coded jdbc:mysql://localhost:3306/... in application.yml
      # matches. Spring Boot's docker-compose integration tracks the container by service name
      # and waits for the healthcheck below before bootstrapping the app.
      - "3306:3306"
    volumes:
      # Mount the init script into the container's first-time-init directory. The official MySQL
      # image runs every *.sql in /docker-entrypoint-initdb.d AS ROOT before the server becomes
      # ready — so this is where the GRANT statement lives. It runs once per data volume; if you
      # need to re-grant on a re-created volume, `docker compose down -v` removes the volume.
      - "./src/main/resources/mysql_init.sql:/docker-entrypoint-initdb.d/mysql_init.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 1s
      timeout: 5s
      retries: 30
