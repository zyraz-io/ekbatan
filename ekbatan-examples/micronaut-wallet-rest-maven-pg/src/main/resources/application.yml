micronaut:
  application:
    name: micronaut-wallet-rest-maven-pg

# Single source of truth for DB connection details — both Flyway (run on startup via
# FlywayConfiguration) and Ekbatan's runtime pools read from this same block. Micronaut's
# own datasource auto-config (micronaut-data, jdbc) is intentionally NOT used — we don't
# declare a `datasources.default` here.
ekbatan:
  namespace: example.wallet.maven-pg-micronaut
  sharding:
    defaultShard:
      group: 0
      member: 0
    groups:
      - group: 0
        name: default
        members:
          - member: 0
            name: default
            configs:
              primaryConfig:
                jdbcUrl: jdbc:postgresql://localhost:5432/wallet
                username: wallet
                password: wallet
                # Micronaut's Hikari init in this combo doesn't always pick the PG driver via the
                # SPI when the JVM is started by Maven's surefire worker — declare it explicitly.
                # Same caution applies to the jobsConfig block below.
                driverClassName: org.postgresql.Driver
                maximumPoolSize: 20
              jobsConfig:
                jdbcUrl: jdbc:postgresql://localhost:5432/wallet
                username: wallet
                password: wallet
                driverClassName: org.postgresql.Driver
                maximumPoolSize: 5
              lockConfig:
                jdbcUrl: jdbc:postgresql://localhost:5432/wallet
                username: wallet
                password: wallet
                driverClassName: org.postgresql.Driver
                # Lock pool: sized for max concurrent held leases (each lease pins one connection
                # until release). Leak detection off — locks may be legitimately held for a while.
                maximumPoolSize: 30
                leakDetectionThreshold: 0
  local-event-handler:
    handling:
      enabled: true