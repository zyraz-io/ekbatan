micronaut:
  application:
    name: micronaut-wallet-rest-gradle-mysql

ekbatan:
  namespace: example.wallet.gradle-mysql-micronaut
  sharding:
    defaultShard:
      group: 0
      member: 0
    groups:
      - group: 0
        name: default
        members:
          - member: 0
            name: default
            configs:
              primaryConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet?serverTimezone=UTC
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 20
              jobsConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet?serverTimezone=UTC
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 5
              lockConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet?serverTimezone=UTC
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                # Lock pool: sized for max concurrent held leases (each lease pins one connection
                # until release). Leak detection off — locks may be legitimately held for a while.
                maximumPoolSize: 30
                leakDetectionThreshold: 0
  local-event-handler:
    handling:
      enabled: true