spring:
  application:
    name: spring-boot-wallet-rest-maven-native-mysql

# Two configured shards. Each action execution in this example touches one shard only;
# cross-shard actions are not enabled.
ekbatan:
  namespace: example.wallet
  sharding:
    defaultShard:
      group: 0
      member: 0
    groups:
      - group: 0
        name: global
        members:
          - member: 0
            name: global
            configs:
              primaryConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 20
              jobsConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 5
              lockConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 30
                leakDetectionThreshold: 0
      - group: 1
        name: mexico
        members:
          - member: 0
            name: mexico
            configs:
              primaryConfig:
                jdbcUrl: jdbc:mysql://localhost:3307/wallet
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 20
              jobsConfig:
                jdbcUrl: jdbc:mysql://localhost:3307/wallet
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 5
              lockConfig:
                jdbcUrl: jdbc:mysql://localhost:3307/wallet
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 30
                leakDetectionThreshold: 0
  local-event-handler:
    handling:
      enabled: true

logging:
  level:
    io.ekbatan: INFO
    io.example.wallet: DEBUG
