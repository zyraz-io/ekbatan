spring:
  application:
    name: spring-boot-wallet-rest-maven-native-mysql


# Single source of truth for DB connection details — both Flyway (run by Spring Boot's
# FlywayAutoConfiguration via the spring.datasource.* block at the bottom of this file)
# and Ekbatan's runtime pools read from the same ekbatan.sharding.* block.
#
# Notes on the JDBC URLs:
#   - `serverTimezone=UTC` keeps DATETIME round-tripping consistent with Ekbatan's
#     always-UTC contract. The container is also pinned to TZ=UTC (see compose.yaml), so
#     this is a belt-and-suspenders setting — newer connectors infer TZ from the server,
#     but it's cheap.
#   - The main DB is `wallet`; eventlog is a separate database `eventlog`, created by the
#     V0000 Flyway migration. The connecting user needs cross-database privileges — set up
#     by `mysql_init.sql` mounted into /docker-entrypoint-initdb.d. See docs/database/mysql.md.
ekbatan:
  namespace: example.wallet.maven-native-mysql
  sharding:
    defaultShard:
      group: 0
      member: 0
    groups:
      - group: 0
        name: default
        members:
          - member: 0
            name: default
            configs:
              primaryConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet?serverTimezone=UTC
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 20
              jobsConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet?serverTimezone=UTC
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 5
  local-event-handler:
    handling:
      enabled: true

logging:
  level:
    io.ekbatan: INFO
    io.example.wallet: DEBUG

