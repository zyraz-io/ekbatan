micronaut:
  application:
    name: micronaut-wallet-rest-gradle-native-mysql

ekbatan:
  namespace: example.wallet.gradle-native-mysql-micronaut
  sharding:
    defaultShard:
      group: 0
      member: 0
    groups:
      - group: 0
        name: default
        members:
          - member: 0
            name: default
            configs:
              primaryConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet?serverTimezone=UTC
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 20
              jobsConfig:
                jdbcUrl: jdbc:mysql://localhost:3306/wallet?serverTimezone=UTC
                username: wallet
                password: wallet
                driverClassName: com.mysql.cj.jdbc.Driver
                maximumPoolSize: 5
  local-event-handler:
    handling:
      enabled: true