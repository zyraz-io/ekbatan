syntax = "proto3";

package io.ekbatan.streaming.actionevent.protobuf;

option java_package = "io.ekbatan.streaming.actionevent.protobuf";
option java_outer_classname = "ActionEventProto";
option java_multiple_files = true;

message ActionEvent {
  string id = 1;
  string namespace = 2;
  string action_id = 3;
  string action_name = 4;
  string action_params = 5;
  int64 started_date = 6;
  int64 completion_date = 7;
  optional string model_id = 8;
  optional string model_type = 9;
  optional string event_type = 10;
  optional bytes payload = 11;
  int64 event_date = 12;
}
